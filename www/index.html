<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Splash Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  body{background:#e8e2d8;display:flex;gap:32px;justify-content:center;align-items:center;padding:40px 24px;font-family:'DM Sans',sans-serif;min-height:100vh;box-sizing:border-box;flex-wrap:wrap;}
  .device{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .device-label{font-size:11px;font-weight:500;color:#7a7068;text-transform:uppercase;letter-spacing:0.1em;}
  .shell{border-radius:28px;border:1.5px solid #c0b8aa;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.14),0 4px 16px rgba(0,0,0,0.08);}
  .phone{width:180px;height:370px;}
  .tablet{width:290px;height:390px;border-radius:18px;}
  .splash{width:100%;height:100%;background:#f8f4ee;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:0 0 32px 26px;}
  .cg-mono{position:absolute;top:44%;left:43%;transform:translate(-50%,-50%);display:flex;align-items:center;pointer-events:none;user-select:none;white-space:nowrap;}
  .cg-c,.cg-g{font-family:'Allura',cursive;font-weight:400;color:rgba(124,45,62,0.09);line-height:0.9;}
  .phone .cg-c,.phone .cg-g{font-size:216px;}
  .phone .cg-g{margin-left:-76px;}
  .tablet .cg-c,.tablet .cg-g{font-size:348px;}
  .tablet .cg-g{margin-left:-122px;}
  .splash-content{position:relative;z-index:1;}
  .s-rule{width:26px;height:1.5px;background:#b8933a;margin-bottom:10px;}
  .s-chateau{font-size:8px;letter-spacing:0.28em;text-transform:uppercase;color:#b8933a;margin-bottom:4px;}
  .s-gustav{font-family:'Cormorant Garamond',serif;font-weight:400;color:#1a1612;line-height:1;margin-bottom:8px;}
  .phone .s-gustav{font-size:2.2rem;}
  .tablet .s-gustav{font-size:2.8rem;}
  .s-tag{font-size:7px;color:#7a7068;letter-spacing:0.18em;text-transform:uppercase;}
</style>
</head>
<body>
  <div class="device">
    <div class="device-label">iPhone scale</div>
    <div class="shell phone">
      <div class="splash">
        <div class="cg-mono"><span class="cg-c">C</span><span class="cg-g">G</span></div>
        <div class="splash-content"><div class="s-rule"></div><div class="s-chateau">Château</div><div class="s-gustav">Gustav</div><div class="s-tag">Your personal sommelier</div></div>
      </div>
    </div>
  </div>
  <div class="device">
    <div class="device-label">Tablet (your screen)</div>
    <div class="shell tablet">
      <div class="splash">
        <div class="cg-mono"><span class="cg-c">C</span><span class="cg-g">G</span></div>
        <div class="splash-content"><div class="s-rule"></div><div class="s-chateau">Château</div><div class="s-gustav">Gustav</div><div class="s-tag">Your personal sommelier</div></div>
      </div>
    </div>
  </div>
</body>
</html>
