workflows:
  # ── iOS: builds on a real cloud Mac, can push straight to TestFlight ──
  ios-workflow:
    name: Château Gustav — iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # This must match the exact name you give the integration in
      # Codemagic's UI under Team settings > Integrations > Developer
      # Portal (see README for setup steps).
      app_store_connect: appstore_connect
    environment:
      groups:
        # Create this group in Codemagic's dashboard under
        # Team settings > Environment variable groups, named exactly
        # "appstore_credentials", containing these four variables —
        # see the README for exactly where to find each one:
        #   APP_STORE_CONNECT_ISSUER_ID
        #   APP_STORE_CONNECT_KEY_IDENTIFIER
        #   APP_STORE_CONNECT_PRIVATE_KEY
        #   CERTIFICATE_PRIVATE_KEY
        - appstore_credentials
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.chateaugustav.pairing"
      xcode: latest
      cocoapods: default
      node: latest
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Install CocoaPods dependencies
        script: cd ios/App && pod install
      - name: Sync web assets into the native project
        script: npx cap sync ios
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      # This automatically uploads a successful build to TestFlight, so you
      # can install and test the real app on your own iPhone without ever
      # touching a Mac. Uses the integration named above.
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  # ── Android: builds a signed .aab ready to upload to Play Console ──
  android-workflow:
    name: Château Gustav — Android
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      java: 21
      groups:
        # Create this group too, named exactly "keystore_credentials" —
        # see the README for how to generate these values:
        #   CM_KEYSTORE              (your keystore file, base64-encoded)
        #   CM_KEYSTORE_PASSWORD
        #   CM_KEY_PASSWORD
        #   CM_KEY_ALIAS
        - keystore_credentials
      node: "22"
    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps
      - name: Sync web assets into the native project
        script: npx cap sync android
      - name: Decode keystore and write key.properties for signing
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/android/app/keystore.jks
          cat > "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=keystore.jks
          EOF
      - name: Print SHA-1 fingerprint for Firebase setup
        script: |
          echo "════════════════════════════════════════════════════"
          echo "  COPY THE SHA-1 LINE BELOW INTO FIREBASE CONSOLE"
          echo "════════════════════════════════════════════════════"
          keytool -list -v \
            -keystore "$CM_BUILD_DIR/android/app/keystore.jks" \
            -storepass "$CM_KEYSTORE_PASSWORD" \
            -alias "$CM_KEY_ALIAS" | grep "SHA1:"
          echo "════════════════════════════════════════════════════"
      - name: Make gradlew executable
        script: chmod +x android/gradlew
      - name: Build Android release bundle
        script: cd android && ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
